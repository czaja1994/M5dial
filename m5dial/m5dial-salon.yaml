substitutions:
  name: m5dial-salon
  friendly_name: M5Dial Salon

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  variant: esp32s3
  framework:
    type: esp-idf

logger:
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

time:
  - platform: homeassistant
    id: ha_time

spi:
  id: spi_bus
  mosi_pin: GPIO5
  clk_pin: GPIO6

output:
  - platform: ledc
    pin: GPIO9
    id: backlight_output

light:
  - platform: monochromatic
    output: backlight_output
    id: backlight
    name: Backlight
    restore_mode: ALWAYS_ON
    default_transition_length: 250ms

display:
  - platform: ili9xxx
    id: round_display
    model: GC9A01A
    cs_pin: GPIO7
    dc_pin: GPIO4
    reset_pin: GPIO8
    invert_colors: true
    auto_clear_enabled: false
    update_interval: never

i2c:
  - id: internal_i2c
    sda: GPIO11
    scl: GPIO12
    scan: true

touchscreen:
  - platform: ft63x6
    id: my_touch
    i2c_id: internal_i2c
    on_touch:
      - logger.log:
          format: "touch x=%d y=%d"
          args: ["touch.x", "touch.y"]

sensor:
  - platform: rotary_encoder
    id: encoder
    pin_a: GPIO40
    pin_b: GPIO41
    on_clockwise:
      - logger.log: "encoder CW"
    on_anticlockwise:
      - logger.log: "encoder CCW"

binary_sensor:
  - platform: gpio
    id: front_button
    pin:
      number: GPIO42
      inverted: true
      mode:
        input: true
        pullup: true
    on_multi_click:
      - timing:
          - ON for at least 600ms
        then:
          - logger.log: "btn LONG"
      - timing:
          - ON for at most 400ms
          - OFF for at most 400ms
          - ON for at most 400ms
          - OFF for at least 50ms
        then:
          - logger.log: "btn DOUBLE"
      - timing:
          - ON for at most 400ms
          - OFF for at least 400ms
        then:
          - logger.log: "btn SINGLE"

lvgl:
  displays:
    - round_display
  touchscreens:
    - my_touch
  bg_color: 0x000000
  pages:
    - id: media_page
      widgets:
        - label:
            id: lbl_media_placeholder
            align: CENTER
            text: "M5Dial OK"
            text_color: 0xFFFFFF
