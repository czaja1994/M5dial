substitutions:
  name: m5dial-salon
  friendly_name: M5Dial Salon

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  variant: esp32s3
  framework:
    type: esp-idf

logger:
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

time:
  - platform: homeassistant
    id: ha_time

spi:
  id: spi_bus
  mosi_pin: GPIO5
  clk_pin: GPIO6

output:
  - platform: ledc
    pin: GPIO9
    id: backlight_output

light:
  - platform: monochromatic
    output: backlight_output
    id: backlight
    name: Backlight
    restore_mode: ALWAYS_ON
    default_transition_length: 250ms

display:
  - platform: ili9xxx
    id: round_display
    model: GC9A01A
    cs_pin: GPIO7
    dc_pin: GPIO4
    reset_pin: GPIO8
    invert_colors: true
    auto_clear_enabled: false
    update_interval: never

i2c:
  - id: internal_i2c
    sda: GPIO11
    scl: GPIO12
    scan: true

touchscreen:
  - platform: ft63x6
    id: my_touch
    i2c_id: internal_i2c
    on_touch:
      - logger.log:
          format: "touch x=%d y=%d"
          args: ["touch.x", "touch.y"]

sensor:
  - platform: rotary_encoder
    id: encoder
    pin_a: GPIO40
    pin_b: GPIO41
    on_clockwise:
      - light.turn_on: { id: backlight, brightness: 100% }
      - logger.log: "encoder CW"
    on_anticlockwise:
      - light.turn_on: { id: backlight, brightness: 100% }
      - logger.log: "encoder CCW"
  - platform: homeassistant
    id: ha_volume
    entity_id: media_player.denon
    attribute: volume_level
  - platform: homeassistant
    id: ha_ac_target
    entity_id: climate.air_conditioner
    attribute: temperature
  - platform: homeassistant
    id: ha_ac_current
    entity_id: climate.air_conditioner
    attribute: current_temperature
  - platform: homeassistant
    id: ha_tado_target
    entity_id: climate.living_room
    attribute: temperature

binary_sensor:
  - platform: gpio
    id: front_button
    pin:
      number: GPIO42
      inverted: true
      mode:
        input: true
        pullup: true
    on_multi_click:
      - timing:
          - ON for at least 600ms
        then:
          - logger.log: "btn LONG"
      - timing:
          - ON for at most 400ms
          - OFF for at most 400ms
          - ON for at most 400ms
          - OFF for at least 50ms
        then:
          - logger.log: "btn DOUBLE"
          - script.execute: nav_toggle
          - if:
              condition:
                lambda: 'return id(current_screen) == 1;'
              then:
                - script.execute: climate_idle_return
              else:
                - script.stop: climate_idle_return
      - timing:
          - ON for at most 400ms
          - OFF for at least 400ms
        then:
          - logger.log: "btn SINGLE"

text_sensor:
  - platform: homeassistant
    id: ha_media_title
    entity_id: media_player.denon_2
    attribute: media_title
  - platform: homeassistant
    id: ha_media_artist
    entity_id: media_player.denon_2
    attribute: media_artist
  - platform: homeassistant
    id: ha_heos_state
    entity_id: media_player.denon_2
  - platform: homeassistant
    id: ha_avr_source
    entity_id: media_player.denon
    attribute: source
  - platform: homeassistant
    id: ha_avr_state
    entity_id: media_player.denon
  - platform: homeassistant
    id: ha_appletv_title
    entity_id: media_player.apple_tv
    attribute: media_title
  - platform: homeassistant
    id: ha_appletv_app
    entity_id: media_player.apple_tv
    attribute: app_name
  - platform: homeassistant
    id: ha_ac_state
    entity_id: climate.air_conditioner
  - platform: homeassistant
    id: ha_ac_fan
    entity_id: climate.air_conditioner
    attribute: fan_mode
  - platform: homeassistant
    id: ha_ac_swing
    entity_id: climate.air_conditioner
    attribute: swing_mode
  - platform: homeassistant
    id: ha_season
    entity_id: input_boolean.heating_season

globals:
  - id: current_screen          # 0 = media, 1 = climate
    type: int
    restore_value: false
    initial_value: "0"
  - id: pending_volume          # debounced target volume 0..1, -1 = idle
    type: float
    restore_value: false
    initial_value: "-1"
  - id: pending_temp            # debounced target temp, -100 = idle
    type: float
    restore_value: false
    initial_value: "-100"

script:
  - id: nav_to_media
    then:
      - lvgl.page.show: media_page
      - lambda: 'id(current_screen) = 0;'
      - light.turn_on: { id: backlight, brightness: 100% }
  - id: nav_to_climate
    then:
      - lvgl.page.show: climate_page
      - lambda: 'id(current_screen) = 1;'
      - light.turn_on: { id: backlight, brightness: 100% }
  - id: nav_toggle
    then:
      - if:
          condition:
            lambda: 'return id(current_screen) == 0;'
          then:
            - script.execute: nav_to_climate
          else:
            - script.execute: nav_to_media
  - id: climate_idle_return
    mode: restart
    then:
      - delay: 15s
      - script.execute: nav_to_media

lvgl:
  displays:
    - round_display
  touchscreens:
    - my_touch
  bg_color: 0x000000
  on_idle:
    timeout: 60s
    then:
      - light.turn_on:
          id: backlight
          brightness: 20%
  pages:
    - id: media_page
      widgets:
        - label:
            id: lbl_media_placeholder
            align: CENTER
            text: "MEDIA"
            text_color: 0xFFFFFF
    - id: climate_page
      widgets:
        - label:
            id: lbl_climate_placeholder
            align: CENTER
            text: "CLIMATE"
            text_color: 0xFFFFFF
