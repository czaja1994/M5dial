substitutions:
  name: m5dial-salon
  friendly_name: M5Dial Salon

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  variant: esp32s3
  framework:
    type: esp-idf

logger:
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

time:
  - platform: homeassistant
    id: ha_time

spi:
  id: spi_bus
  mosi_pin: GPIO5
  clk_pin: GPIO6

output:
  - platform: ledc
    pin: GPIO9
    id: backlight_output

light:
  - platform: monochromatic
    output: backlight_output
    id: backlight
    name: Backlight
    restore_mode: ALWAYS_ON
    default_transition_length: 250ms

display:
  - platform: ili9xxx
    id: round_display
    model: GC9A01A
    cs_pin: GPIO7
    dc_pin: GPIO4
    reset_pin: GPIO8
    invert_colors: true
    auto_clear_enabled: false
    update_interval: never

font:
  - file: "fonts/fa-solid-900.ttf"
    id: fa_icons
    size: 28
    bpp: 4
    glyphs:
      - ""  # play
      - ""  # pause
      - ""  # prev
      - ""  # next
      - ""  # power
      - ""  # snowflake / cool
      - ""  # fire / heat
      - ""  # droplet / dry
      - ""  # fan
      - ""  # swing / move
  - file: "fonts/fa-solid-900.ttf"
    id: fa_small
    size: 16
    bpp: 4
    glyphs:
      - ""  # swing both (4-way)
      - ""  # swing vertical
      - ""  # swing horizontal
      - ""  # swing off (minus)
image:
  - id: img_spotify
    file: images/spotify.png
    type: RGB565
    transparency: alpha_channel
    resize: 36x37
  - id: img_youtube
    file: images/youtube.png
    type: RGB565
    transparency: alpha_channel
  - id: img_netflix
    file: images/netflix.png
    type: RGB565
    transparency: alpha_channel
  - id: img_max
    file: images/hbomax.png
    type: RGB565
    transparency: alpha_channel
  - id: img_disney
    file: images/disney.png
    type: RGB565
    transparency: alpha_channel
  - id: img_prime
    file: images/prime.png
    type: RGB565
    transparency: alpha_channel
  - id: img_ps5
    file: images/playstation.png
    type: RGB565
    transparency: alpha_channel
  - id: img_skyshowtime
    file: images/skyshowtime.png
    type: RGB565
    transparency: alpha_channel
  - id: img_plex
    file: images/plex.png
    type: RGB565
    transparency: alpha_channel
  - id: img_appletv
    file: images/appletv.png
    type: RGB565
    transparency: alpha_channel

i2c:
  - id: internal_i2c
    sda: GPIO11
    scl: GPIO12
    scan: true

touchscreen:
  - platform: ft63x6
    id: my_touch
    i2c_id: internal_i2c
    on_touch:
      - logger.log:
          format: "touch x=%d y=%d"
          args: ["touch.x", "touch.y"]
      - light.turn_on: { id: backlight, brightness: 100% }
      - if:
          condition: { lambda: 'return id(current_screen) != 0;' }
          then:
            - script.execute: climate_idle_return   # any touch resets the 15s idle->media timer

sensor:
  - platform: rotary_encoder
    id: encoder
    pin_a: GPIO40
    pin_b: GPIO41
    on_clockwise:
      - light.turn_on: { id: backlight, brightness: 100% }
      - lambda: |-
          if (id(current_screen) != 0) id(climate_idle_return).execute();  // turning the dial resets the idle timer
          if (id(current_screen) == 0) {
            float base = (id(pending_volume) >= 0) ? id(pending_volume)
                        : (id(ha_volume).has_state() ? id(ha_volume).state : 0.0f);
            float v = base + 0.02f; if (v > 1.0f) v = 1.0f;
            id(pending_volume) = v;
            int pct = (int) roundf(v*100.0f);
            lv_arc_set_value(id(m_vol_arc), pct);
            char b[16]; snprintf(b,sizeof(b),"Vol %d%%",pct);
            lv_label_set_text(id(m_vol_lbl), b);
            id(volume_apply).execute();
          } else if (id(current_screen) == 1) {
            bool winter = (id(ha_season).state == "on");
            std::string st = id(ha_ac_state).state;
            bool acoff = (st == "off" || st == "unavailable" || st == "");
            if (winter || !acoff) {
              float cur = winter ? (id(ha_tado_target).has_state() ? id(ha_tado_target).state : 20.0f)
                                 : (id(ha_ac_target).has_state() ? id(ha_ac_target).state : 22.0f);
              float base = (id(pending_temp) > -50.0f) ? id(pending_temp) : cur;
              float t = base + 0.5f;
              float lo = winter ? 5.0f : 18.0f, hi = winter ? 25.0f : 30.0f;
              if (t < lo) t = lo; if (t > hi) t = hi;
              id(pending_temp) = t;
              char b[16]; snprintf(b,sizeof(b),"%.1f\xC2\xB0",t);
              lv_label_set_text(id(c_temp), b);
              id(temp_apply).execute();
            }
          }
    on_anticlockwise:
      - light.turn_on: { id: backlight, brightness: 100% }
      - lambda: |-
          if (id(current_screen) != 0) id(climate_idle_return).execute();  // turning the dial resets the idle timer
          if (id(current_screen) == 0) {
            float base = (id(pending_volume) >= 0) ? id(pending_volume)
                        : (id(ha_volume).has_state() ? id(ha_volume).state : 0.0f);
            float v = base - 0.02f; if (v < 0.0f) v = 0.0f;
            id(pending_volume) = v;
            int pct = (int) roundf(v*100.0f);
            lv_arc_set_value(id(m_vol_arc), pct);
            char b[16]; snprintf(b,sizeof(b),"Vol %d%%",pct);
            lv_label_set_text(id(m_vol_lbl), b);
            id(volume_apply).execute();
          } else if (id(current_screen) == 1) {
            bool winter = (id(ha_season).state == "on");
            std::string st = id(ha_ac_state).state;
            bool acoff = (st == "off" || st == "unavailable" || st == "");
            if (winter || !acoff) {
              float cur = winter ? (id(ha_tado_target).has_state() ? id(ha_tado_target).state : 20.0f)
                                 : (id(ha_ac_target).has_state() ? id(ha_ac_target).state : 22.0f);
              float base = (id(pending_temp) > -50.0f) ? id(pending_temp) : cur;
              float t = base - 0.5f;
              float lo = winter ? 5.0f : 18.0f, hi = winter ? 25.0f : 30.0f;
              if (t < lo) t = lo; if (t > hi) t = hi;
              id(pending_temp) = t;
              char b[16]; snprintf(b,sizeof(b),"%.1f\xC2\xB0",t);
              lv_label_set_text(id(c_temp), b);
              id(temp_apply).execute();
            }
          }
  - platform: homeassistant
    id: ha_volume
    entity_id: media_player.denon
    attribute: volume_level
  - platform: homeassistant
    id: ha_ac_target
    entity_id: climate.air_conditioner
    attribute: temperature
    on_value:
      - script.execute: update_climate
  - platform: homeassistant
    id: ha_ac_current
    entity_id: climate.air_conditioner
    attribute: current_temperature
    on_value:
      - script.execute: update_climate
  - platform: homeassistant
    id: ha_tado_target
    entity_id: climate.living_room
    attribute: temperature

    on_value:
      - script.execute: update_climate
binary_sensor:
  - platform: gpio
    id: front_button
    pin:
      number: GPIO42
      inverted: true
      mode:
        input: true
        pullup: true
    on_multi_click:
      - timing:
          - ON for at least 600ms
        then:
          - logger.log: "btn LONG"
          - light.turn_on: { id: backlight, brightness: 100% }
          - if:
              condition: { lambda: 'return id(current_screen) == 0;' }
              then:
                - script.execute: media_long
      - timing:
          - ON for at most 400ms
          - OFF for at most 400ms
          - ON for at most 400ms
          - OFF for at least 50ms
        then:
          - logger.log: "btn DOUBLE"
          - script.execute: nav_toggle
          - if:
              condition:
                lambda: 'return id(current_screen) == 1;'
              then:
                - script.execute: climate_idle_return
              else:
                - script.stop: climate_idle_return
      - timing:
          - ON for at most 400ms
          - OFF for at least 400ms
        then:
          - logger.log: "btn SINGLE"
          - light.turn_on: { id: backlight, brightness: 100% }
          - if:
              condition: { lambda: 'return id(current_screen) == 0;' }
              then:
                - script.execute: media_press

text_sensor:
  - platform: homeassistant
    id: ha_media_title
    entity_id: media_player.denon_2
    attribute: media_title
  - platform: homeassistant
    id: ha_media_artist
    entity_id: media_player.denon_2
    attribute: media_artist
  - platform: homeassistant
    id: ha_heos_state
    entity_id: media_player.denon_2
  - platform: homeassistant
    id: ha_avr_source
    entity_id: media_player.denon
    attribute: source
  - platform: homeassistant
    id: ha_avr_state
    entity_id: media_player.denon
  - platform: homeassistant
    id: ha_appletv_title
    entity_id: media_player.apple_tv
    attribute: media_title
  - platform: homeassistant
    id: ha_appletv_app
    entity_id: media_player.apple_tv
    attribute: app_name
  - platform: homeassistant
    id: ha_appletv_state
    entity_id: media_player.apple_tv
  - platform: homeassistant
    id: ha_ac_state
    entity_id: climate.air_conditioner
    on_value:
      - script.execute: update_climate
  - platform: homeassistant
    id: ha_ac_fan
    entity_id: climate.air_conditioner
    attribute: fan_mode
    on_value:
      - script.execute: update_climate
      - script.execute: update_fan_page
  - platform: homeassistant
    id: ha_ac_swing
    entity_id: climate.air_conditioner
    attribute: swing_mode
    on_value:
      - script.execute: update_climate
      - script.execute: update_swing_page
  - platform: homeassistant
    id: ha_ac_swing_h
    entity_id: climate.air_conditioner
    attribute: swing_horizontal_mode
    on_value:
      - script.execute: update_climate
      - script.execute: update_swing_page
  - platform: homeassistant
    id: ha_season
    entity_id: input_boolean.heating_season
    on_value:
      - script.execute: update_climate
globals:
  - id: current_screen          # 0 = media, 1 = climate
    type: int
    restore_value: false
    initial_value: "0"
  - id: pending_volume          # debounced target volume 0..1, -1 = idle
    type: float
    restore_value: false
    initial_value: "-1"
  - id: pending_temp            # debounced target temp, -100 = idle
    type: float
    restore_value: false
    initial_value: "-100"

script:
  - id: nav_to_media
    then:
      - lvgl.page.show: media_page
      - lambda: 'id(current_screen) = 0;'
      - light.turn_on: { id: backlight, brightness: 100% }
  - id: nav_to_climate
    then:
      - lvgl.page.show: climate_page
      - lambda: 'id(current_screen) = 1;'
      - light.turn_on: { id: backlight, brightness: 100% }
      - script.execute: update_climate
  - id: nav_toggle
    then:
      - if:
          condition:
            lambda: 'return id(current_screen) == 0;'
          then:
            - script.execute: nav_to_climate
          else:
            - script.execute: nav_to_media
  - id: climate_idle_return
    mode: restart
    then:
      - delay: 15s
      - script.execute: nav_to_media
  - id: update_climate
    then:
      - lambda: |-
          bool winter = (id(ha_season).state == "on");
          std::string st = id(ha_ac_state).state;
          bool on = !(st == "off" || st == "unavailable" || st == "");
          auto show = [](lv_obj_t* o, bool v){ if (v) lv_obj_clear_flag(o, LV_OBJ_FLAG_HIDDEN); else lv_obj_add_flag(o, LV_OBJ_FLAG_HIDDEN); };
          const char* icon = "\xEF\x8B\x9C"; uint32_t mcol = 0x4FC3F7;
          if (winter) { icon = "\xEF\x81\xAD"; mcol = 0xFF7A45; }
          else if (st == "heat") { icon = "\xEF\x81\xAD"; mcol = 0xFF7A45; }
          else if (st == "dry") { icon = "\xEF\x81\x83"; mcol = 0x9CCC65; }
          else if (st == "fan_only") { icon = "\xEF\xA1\xA3"; mcol = 0xB0BEC5; }
          lv_label_set_text(id(c_mode_icon), icon);
          lv_obj_set_style_text_color(id(c_mode_icon), lv_color_hex(mcol), 0);
          lv_label_set_text(id(c_fan_icon), "\xEF\xA1\xA3");
          lv_label_set_text(id(c_swing_icon), "\xEF\x81\x87");
          show(id(c_fan_a), false); show(id(c_fbar1), false); show(id(c_fbar2), false); show(id(c_fbar3), false);
          show(id(c_swing_status), false);
          if (winter) {
            show(id(c_on_btn), false); show(id(c_power_off), false);
            show(id(c_fan_btn), false); show(id(c_swing_btn), false);
            show(id(c_mode_icon), true); show(id(c_temp), true); show(id(c_current), true);
            lv_label_set_text(id(c_current), "Tado: Salon + Kuchnia");
            float disp;
            if (id(pending_temp) > -50.0f) {
              disp = id(pending_temp);
              if (id(ha_tado_target).has_state() && fabsf(id(ha_tado_target).state - id(pending_temp)) < 0.25f) id(pending_temp) = -100.0f;
            } else disp = id(ha_tado_target).has_state() ? id(ha_tado_target).state : -100.0f;
            char b[16]; if (disp > -50) snprintf(b,sizeof(b),"%.1f\xC2\xB0",disp); else snprintf(b,sizeof(b),"-");
            lv_label_set_text(id(c_temp), b);
            return;
          }
          show(id(c_on_btn), !on);
          show(id(c_mode_icon), on); show(id(c_temp), on); show(id(c_current), on);
          show(id(c_power_off), on); show(id(c_fan_btn), on); show(id(c_swing_btn), on);
          if (on) {
            float disp;
            if (id(pending_temp) > -50.0f) {
              disp = id(pending_temp);
              if (id(ha_ac_target).has_state() && fabsf(id(ha_ac_target).state - id(pending_temp)) < 0.25f) id(pending_temp) = -100.0f;
            } else disp = id(ha_ac_target).has_state() ? id(ha_ac_target).state : -100.0f;
            char b[16]; if (disp > -50) snprintf(b,sizeof(b),"%.1f\xC2\xB0",disp); else snprintf(b,sizeof(b),"-");
            lv_label_set_text(id(c_temp), b);
            float cur = id(ha_ac_current).has_state() ? id(ha_ac_current).state : -100.0f;
            char c[24]; if (cur > -50) snprintf(c,sizeof(c),"akt. %.1f\xC2\xB0",cur); else snprintf(c,sizeof(c)," ");
            lv_label_set_text(id(c_current), c);
            std::string fan = id(ha_ac_fan).state;
            int lvl = (fan == "low") ? 1 : (fan == "medium") ? 2 : (fan == "high") ? 3 : 0;
            bool autof = (lvl == 0);
            show(id(c_fan_a), autof);
            show(id(c_fbar1), !autof); show(id(c_fbar2), !autof); show(id(c_fbar3), !autof);
            uint32_t fon = 0x2E78E6, foff = 0x3A3F47;
            lv_obj_set_style_bg_color(id(c_fbar1), lv_color_hex(lvl >= 1 ? fon : foff), 0);
            lv_obj_set_style_bg_color(id(c_fbar2), lv_color_hex(lvl >= 2 ? fon : foff), 0);
            lv_obj_set_style_bg_color(id(c_fbar3), lv_color_hex(lvl >= 3 ? fon : foff), 0);
            bool sv = (id(ha_ac_swing).state == "on");
            bool sh = (id(ha_ac_swing_h).state == "on");
            const char* sg = "\xEF\x81\xA8";
            if (sv && sh) sg = "\xEF\x81\x87";
            else if (sv) sg = "\xEF\x81\xBD";
            else if (sh) sg = "\xEF\x81\xBE";
            show(id(c_swing_status), true);
            lv_label_set_text(id(c_swing_status), sg);
            lv_obj_set_style_text_color(id(c_swing_status), lv_color_hex((sv || sh) ? 0xFFFFFF : 0x4A4F57), 0);
          }
  - id: temp_apply
    mode: restart
    then:
      - delay: 200ms
      - if:
          condition: { lambda: 'return id(pending_temp) > -50.0f;' }
          then:
            - if:
                condition: { lambda: 'return id(ha_season).state == "on";' }
                then:
                  - homeassistant.action:
                      action: climate.set_temperature
                      data:
                        entity_id: climate.living_room
                        temperature: !lambda 'return id(pending_temp);'
                  - homeassistant.action:
                      action: climate.set_temperature
                      data:
                        entity_id: climate.kitchen
                        temperature: !lambda 'return id(pending_temp);'
                else:
                  - homeassistant.action:
                      action: climate.set_temperature
                      data:
                        entity_id: climate.air_conditioner
                        temperature: !lambda 'return id(pending_temp);'
  - id: nav_to_fan
    then:
      - lambda: 'id(current_screen) = 2;'
      - lvgl.page.show: fan_page
      - light.turn_on: { id: backlight, brightness: 100% }
      - script.execute: update_fan_page
      - script.execute: climate_idle_return
  - id: nav_to_swing
    then:
      - lambda: 'id(current_screen) = 3;'
      - lvgl.page.show: swing_page
      - light.turn_on: { id: backlight, brightness: 100% }
      - script.execute: update_swing_page
      - script.execute: climate_idle_return
  - id: back_to_climate
    then:
      - lambda: 'id(current_screen) = 1;'
      - lvgl.page.show: climate_page
      - script.execute: update_climate
      - script.execute: climate_idle_return
  - id: update_fan_page
    then:
      - lambda: |-
          std::string fan = id(ha_ac_fan).state;
          auto col = [](lv_obj_t* o, bool a){ lv_obj_set_style_bg_color(o, lv_color_hex(a?0x2E78E6:0x1B1F26), 0); };
          col(id(c_fb_auto), fan == "nature");
          col(id(c_fb_low),  fan == "low");
          col(id(c_fb_med),  fan == "medium");
          col(id(c_fb_high), fan == "high");
  - id: update_swing_page
    then:
      - lambda: |-
          bool v = (id(ha_ac_swing).state == "on");
          bool h = (id(ha_ac_swing_h).state == "on");
          lv_obj_set_style_bg_color(id(c_sw_vert),  lv_color_hex(v?0x2E78E6:0x1B1F26), 0);
          lv_obj_set_style_bg_color(id(c_sw_horiz), lv_color_hex(h?0x2E78E6:0x1B1F26), 0);
          lv_label_set_text(id(c_sw_vert_lbl),  v ? "Pionowy: ON" : "Pionowy: OFF");
          lv_label_set_text(id(c_sw_horiz_lbl), h ? "Poziomy: ON" : "Poziomy: OFF");
  - id: toggle_swing_vert
    then:
      - script.execute: climate_idle_return
      - homeassistant.action:
          action: climate.set_swing_mode
          data:
            entity_id: climate.air_conditioner
            swing_mode: !lambda 'return id(ha_ac_swing).state == "on" ? "off" : "on";'
  - id: toggle_swing_horiz
    then:
      - script.execute: climate_idle_return
      - homeassistant.action:
          action: climate.set_swing_horizontal_mode
          data:
            entity_id: climate.air_conditioner
            swing_horizontal_mode: !lambda 'return id(ha_ac_swing_h).state == "on" ? "off" : "on";'
  - id: update_media
    then:
      - lambda: |-
          std::string avr = id(ha_avr_state).state;
          std::string source = id(ha_avr_source).state;
          std::string heos = id(ha_heos_state).state;
          bool avr_on = !(avr == "off" || avr == "unavailable" || avr.empty());
          bool heos_active = (heos == "playing" || heos == "paused" || heos == "buffering");
          bool appletv = avr_on && (source == "APPLE TV");
          bool ps5 = avr_on && (source == "PlayStation 5");
          auto show = [](lv_obj_t* o, bool v){ if (v) lv_obj_clear_flag(o, LV_OBJ_FLAG_HIDDEN); else lv_obj_add_flag(o, LV_OBJ_FLAG_HIDDEN); };
          show(id(m_top), true);
          show(id(l_youtube), false); show(id(l_netflix), false); show(id(l_max), false);
          show(id(l_disney), false); show(id(l_prime), false); show(id(l_ps5), false);
          show(id(l_skyshowtime), false); show(id(l_plex), false);
          show(id(l_appletv), false);
          show(id(m_spotify_logo), false);
          show(id(m_btn_play), heos_active);
          show(id(m_btn_prev), heos_active);
          show(id(m_btn_next), heos_active);
          bool textlogo = false;
          bool titles = false;
          if (heos_active) {
            show(id(m_top), false);
            show(id(m_spotify_logo), true);
            lv_label_set_text(id(m_title), id(ha_media_title).state.c_str());
            lv_label_set_text(id(m_artist), id(ha_media_artist).state.c_str());
            lv_label_set_text(id(m_play_icon), heos == "playing" ? "" : "");
            titles = true;
          } else if (appletv) {
            std::string app = id(ha_appletv_app).state;
            std::string ast = id(ha_appletv_state).state;
            bool aplaying = (ast == "playing" || ast == "paused");
            lv_label_set_text(id(m_top), "Apple TV");
            bool matched = false;
            if (aplaying) {
              if (app.find("YouTube") != std::string::npos) { show(id(l_youtube), true); matched = true; }
              else if (app.find("HBO") != std::string::npos || app == "Max") { show(id(l_max), true); matched = true; }
              else if (app.find("Netflix") != std::string::npos) { show(id(l_netflix), true); matched = true; }
              else if (app.find("Disney") != std::string::npos) { show(id(l_disney), true); matched = true; }
              else if (app.find("Prime") != std::string::npos) { show(id(l_prime), true); matched = true; }
              else if (app.find("SkyShowtime") != std::string::npos) { show(id(l_skyshowtime), true); matched = true; }
              else if (app.find("Plex") != std::string::npos) { show(id(l_plex), true); matched = true; }
            }
            if (!matched) { show(id(l_appletv), true); }
          } else if (ps5) {
            lv_label_set_text(id(m_top), "PlayStation 5");
            show(id(l_ps5), true);
          } else {
            lv_label_set_text(id(m_top), "Denon");
            lv_label_set_text(id(m_logo), "DENON");
            textlogo = true;
          }
          show(id(m_logo), textlogo);
          show(id(m_title), titles);
          show(id(m_artist), titles);
          float disp = -1.0f;
          if (id(pending_volume) >= 0) {
            disp = id(pending_volume);
            if (id(ha_volume).has_state() && fabsf(id(ha_volume).state - id(pending_volume)) < 0.015f) {
              id(pending_volume) = -1;
            }
          } else if (id(ha_volume).has_state()) {
            disp = id(ha_volume).state;
          }
          if (disp >= 0) {
            int pct = (int) roundf(disp * 100.0f);
            lv_arc_set_value(id(m_vol_arc), pct);
            char buf[16]; snprintf(buf, sizeof(buf), "Vol %d%%", pct);
            lv_label_set_text(id(m_vol_lbl), buf);
          } else {
            lv_label_set_text(id(m_vol_lbl), "Vol -");
          }
  - id: volume_apply
    mode: restart
    then:
      - delay: 150ms
      - if:
          condition: { lambda: 'return id(pending_volume) >= 0;' }
          then:
            - homeassistant.action:
                action: media_player.volume_set
                data:
                  entity_id: media_player.denon
                  volume_level: !lambda 'return id(pending_volume);'
      # pending_volume is cleared by update_media once ha_volume reflects the new value,
      # so the arc holds the target instead of snapping back to the stale reading.
  - id: media_press
    then:
      - lambda: |-
          std::string avr = id(ha_avr_state).state;
          std::string source = id(ha_avr_source).state;
          std::string heos = id(ha_heos_state).state;
          bool avr_on = !(avr == "off" || avr == "unavailable" || avr.empty());
          bool heos_active = (heos == "playing" || heos == "paused" || heos == "buffering");
          bool busy_video = avr_on && (source == "APPLE TV" || source == "PlayStation 5");
          ESP_LOGD("m5dial", "media_press avr=%s heos=%s src=%s -> %s",
                   avr.c_str(), heos.c_str(), source.c_str(),
                   heos_active ? "play_pause" : (busy_video ? "ignore" : "resume"));
          if (heos_active) { id(do_play_pause).execute(); }
          else if (!busy_video) { id(do_resume).execute(); }
  - id: do_resume
    then:
      - logger.log: "do_resume -> script.m5dial_denon_spotify_resume"
      - homeassistant.action:
          action: script.turn_on
          data:
            entity_id: script.m5dial_denon_spotify_resume
  - id: do_play_pause
    then:
      - logger.log: "do_play_pause -> media_player.media_play_pause denon_2"
      - homeassistant.action:
          action: media_player.media_play_pause
          data:
            entity_id: media_player.denon_2
  - id: media_long
    then:
      - lambda: |-
          std::string avr = id(ha_avr_state).state;
          std::string heos = id(ha_heos_state).state;
          bool avr_on = !(avr == "off" || avr == "unavailable" || avr.empty());
          bool heos_active = (heos == "playing" || heos == "paused" || heos == "buffering");
          ESP_LOGD("m5dial", "media_long avr=%s heos=%s -> %s",
                   avr.c_str(), heos.c_str(), (avr_on || heos_active) ? "turn_off" : "noop");
          if (avr_on || heos_active) { id(do_avr_off).execute(); }
  - id: do_avr_off
    then:
      - logger.log: "do_avr_off -> media_player.turn_off denon"
      - homeassistant.action:
          action: media_player.turn_off
          data:
            entity_id: media_player.denon

interval:
  - interval: 1s
    then:
      - script.execute: update_media

